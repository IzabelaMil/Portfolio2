<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Architektoniczne | Izabela Mil</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
            color: #333;
            text-align: center;
        }
        header {
            margin-bottom: 40px;
        }
        h1 {
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid #333;
            display: inline-block;
            padding-bottom: 10px;
        }
        .gallery {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .gallery img {
            width: 100%;
            height: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 4px;
        }
        footer {
            margin-top: 50px;
            font-size: 0.8em;
            color: #888;
        }
    </style>
</head>
<body>

    <header>
        <h1>Portfolio Architektoniczne</h1>
        <p>Izabela Mil</p>
    </header>

    <div class="gallery">
        <img src="Portfolio%204%20mieszkanie.pdf.png" alt="Strona 1">
        <img src="Portfolio%204%20mieszkanie.pdf(1).png" alt="Strona 2">
        <img src="Portfolio%204%20mieszkanie.pdf(2).png" alt="Strona 3">
        <img src="Portfolio%204%20mieszkanie.pdf(3).png" alt="Strona 4">
        <img src="Portfolio%204%20mieszkanie.pdf(4).png" alt="Strona 5">
        <img src="Portfolio%202%20drohiczyn.jpg" alt="Projekt Drohiczyn">
    </div>

    <footer>
        &copy; 2024 Izabela Mil. Wszystkie prawa zastrzeżone.
    </footer>

</body>
</html>
